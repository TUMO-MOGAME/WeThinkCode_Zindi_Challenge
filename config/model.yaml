# Active model + hyperparameters. Switch `active` to use a different model.
# `strategy`: ovr (MultiOutputClassifier, one model per label) | chain (ClassifierChain).
# `search`: Optuna space used by `python -m src.tune`.

active: catboost     # champion: tuned CatBoost on target encoding (OOF 0.4413)
strategy: ovr

logreg:
  params: {C: 0.015, class_weight: balanced, max_iter: 2000}   # tuned
  search:
    C: {type: float, low: 0.001, high: 100.0, log: true}

rf:
  params: {n_estimators: 400, min_samples_leaf: 3, class_weight: balanced}
  search:
    n_estimators:     {type: int,   low: 200, high: 800}
    min_samples_leaf: {type: int,   low: 1,   high: 10}
    max_features:     {type: float, low: 0.3, high: 1.0}

extratrees:
  params: {n_estimators: 500, min_samples_leaf: 3, class_weight: balanced}
  search:
    n_estimators:     {type: int,   low: 200, high: 800}
    min_samples_leaf: {type: int,   low: 1,   high: 10}
    max_features:     {type: float, low: 0.3, high: 1.0}

histgb:
  params: {learning_rate: 0.06, max_iter: 400, l2_regularization: 1.0}
  search:
    learning_rate:     {type: float, low: 0.01, high: 0.2, log: true}
    max_iter:          {type: int,   low: 200,  high: 800}
    max_leaf_nodes:    {type: int,   low: 15,   high: 63}
    min_samples_leaf:  {type: int,   low: 5,    high: 50}
    l2_regularization: {type: float, low: 0.001, high: 10.0, log: true}

xgb:
  params: {n_estimators: 400, learning_rate: 0.05, max_depth: 4, subsample: 0.8, colsample_bytree: 0.8, reg_lambda: 2.0}
  search:
    n_estimators:     {type: int,   low: 300, high: 900}
    learning_rate:    {type: float, low: 0.01, high: 0.1, log: true}
    max_depth:        {type: int,   low: 3,   high: 7}
    min_child_weight: {type: int,   low: 1,   high: 10}
    subsample:        {type: float, low: 0.6, high: 1.0}
    colsample_bytree: {type: float, low: 0.6, high: 1.0}
    reg_lambda:       {type: float, low: 0.01, high: 10.0, log: true}

lgbm:
  params: {n_estimators: 500, learning_rate: 0.05, num_leaves: 31, subsample: 0.8, colsample_bytree: 0.8, reg_lambda: 2.0, class_weight: balanced}
  search:
    n_estimators:      {type: int,   low: 300, high: 900}
    learning_rate:     {type: float, low: 0.01, high: 0.1, log: true}
    num_leaves:        {type: int,   low: 15,  high: 63}
    min_child_samples: {type: int,   low: 5,   high: 60}
    subsample:         {type: float, low: 0.6, high: 1.0}
    colsample_bytree:  {type: float, low: 0.6, high: 1.0}
    reg_lambda:        {type: float, low: 0.01, high: 10.0, log: true}

catboost:
  params: {iterations: 393, learning_rate: 0.0143, depth: 4, l2_leaf_reg: 7.35}   # tuned (CHAMPION #6, LB 0.4084). SqrtBalanced tried -> compass +0.0046 but LB 0.4064 (within noise), reverted.
  search:
    iterations:    {type: int,   low: 300, high: 900}
    learning_rate: {type: float, low: 0.01, high: 0.1, log: true}
    depth:         {type: int,   low: 4,   high: 8}
    l2_leaf_reg:   {type: float, low: 1.0, high: 10.0, log: true}
